name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Generate worker-configuration.d.ts (gitignored) that tsconfig references.
      - run: npx wrangler types
      - run: npx tsc --noEmit
      - run: npx vitest run
